<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цветной календарь отпусков 2026</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #ef4444; --bg: #f8fafc; --panel: #ffffff; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; font-size: 13px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .grid-layout { display: grid; grid-template-columns: 420px 1fr; gap: 25px; }
        
        .panel { background: var(--panel); padding: 18px; border-radius: 14px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h3 { margin: 0 0 15px 0; font-size: 1.1em; display: flex; align-items: center; gap: 8px; }
        
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-del { background: #fee2e2; color: #dc2626; width: auto; padding: 4px 10px; font-size: 11px; }
        .btn-secondary { background: #64748b; margin-top: 10px; }

        .color-input { width: 50px; height: 38px; padding: 2px; cursor: pointer; border: none; background: none; }
        .dept-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }

        .manage-list { max-height: 150px; overflow-y: auto; margin-top: 10px; border-radius: 8px; background: #fcfcfc; border: 1px solid #f1f5f9; }
        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #f1f5f9; }

        /* Календарь */
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .month { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; }
        .month-title { text-align: center; font-weight: 800; margin-bottom: 12px; color: #334155; text-transform: uppercase; letter-spacing: 1px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        
        .day { 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; background: #f1f5f9; font-size: 11px; font-weight: 500;
            position: relative; transition: 0.2s; color: #64748b;
        }
        .day.weekend { color: var(--danger); background: #fef2f2; }
        
        .day.vacation { color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3); font-weight: bold; }
        .day.conflict { 
            outline: 3px solid var(--danger); outline-offset: -3px; 
            animation: pulse 1.5s infinite; z-index: 10;
        }

        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .conflict-msg { color: #b91c1c; padding: 10px; background: #fef2f2; border-radius: 8px; margin-bottom: 8px; border: 1px solid #fee2e2; }
        .header-actions { display: flex; gap: 10px; }
        .header-actions button { width: auto; font-size: 12px; padding: 8px 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="grid-layout">
        <div class="sidebar">
            <div class="panel">
                <h3>🏢 Отделы и Цвета</h3>
                <div class="dept-row">
                    <input type="text" id="deptName" placeholder="Название отдела">
                    <input type="color" id="deptColor" class="color-input" value="#3b82f6">
                    <button style="width:40px" onclick="addDept()">+</button>
                </div>
                <div id="listDepts" class="manage-list"></div>
            </div>

            <div class="panel">
                <h3>👥 Сотрудники</h3>
                <input type="text" id="empName" placeholder="ФИО сотрудника">
                <select id="empDept"></select>
                <button onclick="addEmployee()">Принять в штат</button>
                <div id="listEmployees" class="manage-list"></div>
            </div>

            <div class="panel" style="background:#f0fdf4">
                <h3>🔗 Правила несовместимости</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                    <select id="relA"></select>
                    <select id="relB"></select>
                </div>
                <button onclick="addRelation()" style="background:var(--success)">Запретить пересечение</button>
                <div id="listAllRestrictions" class="manage-list"></div>
            </div>

            <div class="panel">
                <h3>📅 Добавить отпуск</h3>
                <select id="selectEmp"></select>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <input type="date" id="vacStart" value="2026-06-01">
                    <input type="date" id="vacEnd" value="2026-06-14">
                </div>
                <button onclick="addVacation()">Внести в график</button>
                <div id="listVacations" class="manage-list"></div>
            </div>
            
            <button class="btn-secondary" onclick="clearAllData()">🗑️ Сбросить все данные</button>
        </div>

        <div class="main-content">
            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                    <h2 style="margin:0; color:#0f172a">График отпусков 2026</h2>
                    <div class="header-actions">
                        <div id="conflicts-count" style="align-self:center; margin-right:15px"></div>
                        <button onclick="exportData()" style="background:var(--success)">📥 Скачать список (TXT)</button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendar"></div>
                <div id="conflicts-log" style="margin-top:20px"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('vacationData_v7')) || {
        depts: [],
        employees: [],
        vacations: [],
        restrictions: []
    };

    function save() {
        localStorage.setItem('vacationData_v7', JSON.stringify(data));
        renderAll();
    }

    function addDept() {
        const name = document.getElementById('deptName').value.trim();
        const color = document.getElementById('deptColor').value;
        if(name) {
            const existing = data.depts.find(d => d.name === name);
            if(existing) existing.color = color;
            else data.depts.push({name, color});
            save();
            document.getElementById('deptName').value = '';
        }
    }

    function addEmployee() {
        const name = document.getElementById('empName').value.trim();
        const dept = document.getElementById('empDept').value;
        if(name && dept) {
            data.employees.push({ id: Date.now(), name, dept });
            save();
            document.getElementById('empName').value = '';
        }
    }

    function addRelation() {
        const idA = parseInt(document.getElementById('relA').value);
        const idB = parseInt(document.getElementById('relB').value);
        if(idA && idB && idA !== idB) {
            if(!data.restrictions.some(r => (r[0]===idA && r[1]===idB) || (r[0]===idB && r[1]===idA))) {
                data.restrictions.push([idA, idB]);
                save();
            }
        }
    }

    function addVacation() {
        const empId = parseInt(document.getElementById('selectEmp').value);
        const start = document.getElementById('vacStart').value;
        const end = document.getElementById('vacEnd').value;
        if(empId && start && end) {
            data.vacations.push({ id: Date.now(), empId, start, end });
            save();
        }
    }

    function clearAllData() {
        if(confirm("Вы уверены, что хотите полностью очистить календарь?")) {
            data = { depts: [], employees: [], vacations: [], restrictions: [] };
            save();
        }
    }

    function exportData() {
        if (data.vacations.length === 0 && data.employees.length === 0) {
            alert("Нет данных для выгрузки");
            return;
        }

        let text = "=== ОТЧЕТ ПО ГРАФИКУ ОТПУСКОВ 2026 ===\n";
        text += `Сформировано: ${new Date().toLocaleString()}\n`;
        text += "=".repeat(40) + "\n\n";

        text += "--- ПОФАМИЛЬНЫЙ СПИСОК ---\n";
        const sortedVacations = [...data.vacations].sort((a, b) => {
            const nameA = data.employees.find(e => e.id === a.empId)?.name || "";
            const nameB = data.employees.find(e => e.id === b.empId)?.name || "";
            return nameA.localeCompare(nameB);
        });

        sortedVacations.forEach(v => {
            const emp = data.employees.find(e => e.id === v.empId);
            const dept = emp ? `[${emp.dept}]` : "[Удален]";
            text += `${(emp?.name || "Неизвестен").padEnd(30)} ${dept.padEnd(20)} | ${v.start} -> ${v.end}\n`;
        });

        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `vacations_2026_list.txt`;
        a.click();
    }

    function renderAll() {
        updateSelectors();
        renderLists();
        renderCalendar();
    }

    function updateSelectors() {
        const deptsHtml = data.depts.map(d => `<option value="${d.name}">${d.name}</option>`).join('');
        document.getElementById('empDept').innerHTML = deptsHtml || '<option>Сначала создайте отдел</option>';

        const empsHtml = data.employees.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
        document.getElementById('relA').innerHTML = empsHtml;
        document.getElementById('relB').innerHTML = empsHtml;
        document.getElementById('selectEmp').innerHTML = empsHtml;
    }

    function renderLists() {
        document.getElementById('listDepts').innerHTML = data.depts.map((d, i) => `
            <div class="manage-item">
                <span style="border-left: 8px solid ${d.color}; padding-left: 10px;">${d.name}</span>
                <button class="btn-del" onclick="data.depts.splice(${i},1);save()">×</button>
            </div>
        `).join('');

        document.getElementById('listEmployees').innerHTML = data.employees.map(e => `
            <div class="manage-item">
                <span>${e.name}</span>
                <button class="btn-del" onclick="deleteEmp(${e.id})">×</button>
            </div>
        `).join('');

        document.getElementById('listVacations').innerHTML = data.vacations.map(v => `
            <div class="manage-item">
                <span style="font-size:11px">${data.employees.find(e=>e.id===v.empId)?.name}</span>
                <button class="btn-del" onclick="data.vacations=data.vacations.filter(x=>x.id!==${v.id});save()">×</button>
            </div>
        `).join('');
    }

    function deleteEmp(id) {
        data.employees = data.employees.filter(e => e.id !== id);
        data.vacations = data.vacations.filter(v => v.empId !== id);
        data.restrictions = data.restrictions.filter(r => r[0] !== id && r[1] !== id);
        save();
    }

    function renderCalendar() {
        const container = document.getElementById('calendar');
        container.innerHTML = '';
        const months = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
        let logs = [];

        for (let m = 0; m < 12; m++) {
            let html = `<div class="month"><div class="month-title">${months[m]}</div><div class="days-grid">`;
            const daysInMonth = new Date(2026, m+1, 0).getDate();
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dateObj = new Date(2026, m, d);
                const isWeekend = dateObj.getDay()===0 || dateObj.getDay()===6;
                const dayVacs = data.vacations.filter(v => dateStr >= v.start && dateStr <= v.end);
                
                let classes = ['day'];
                if(isWeekend) classes.push('weekend');
                let style = "";

                if(dayVacs.length > 0) {
                    classes.push('vacation');
                    const deptColors = [...new Set(dayVacs.map(v => {
                        const emp = data.employees.find(e => e.id === v.empId);
                        return data.depts.find(dept => dept.name === emp?.dept)?.color || '#94a3b8';
                    }))];

                    if(deptColors.length === 1) style = `background:${deptColors[0]}`;
                    else if(deptColors.length === 2) style = `background:linear-gradient(45deg, ${deptColors[0]} 50%, ${deptColors[1]} 50%)`;
                    else style = `background:repeating-linear-gradient(45deg, ${deptColors[0]}, ${deptColors[0]} 5px, ${deptColors[1]} 5px, ${deptColors[1]} 10px)`;

                    const hasConflict = data.restrictions.some(r => {
                        const hasA = dayVacs.some(v => v.empId === r[0]);
                        const hasB = dayVacs.some(v => v.empId === r[1]);
                        if(hasA && hasB) {
                            const eA = data.employees.find(e => e.id === r[0]);
                            const eB = data.employees.find(e => e.id === r[1]);
                            const logEntry = `⚠️ ${dateStr}: Пересечение ${eA.name} и ${eB.name}`;
                            if(!logs.includes(logEntry)) logs.push(logEntry);
                            return true;
                        }
                        return false;
                    });
                    if(hasConflict) classes.push('conflict');
                }

                html += `<div class="${classes.join(' ')}" style="${style}">${d}</div>`;
            }
            container.innerHTML += html + `</div></div>`;
        }
        document.getElementById('conflicts-log').innerHTML = logs.map(l => `<div class="conflict-msg">${l}</div>`).join('');
        document.getElementById('conflicts-count').innerHTML = logs.length ? `<span style="color:var(--danger); font-weight:bold">Конфликтов: ${logs.length}</span>` : `<span style="color:var(--success)">Ошибок нет</span>`;
    }

    renderAll();
</script>
</body>
</html>
